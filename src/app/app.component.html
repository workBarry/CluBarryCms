<div class="admin-shell" *ngIf="auth.currentUser(); else loginView">
  <aside class="sidebar" [class.open]="sidebarOpen" (click)="sidebarOpen = false">
    <a class="brand" routerLink="/dashboard">
      <span class="brand-mark">CM</span>
      <div>
        <strong>Club MS</strong>
        <small>管理後台</small>
      </div>
    </a>

    <nav class="side-nav" aria-label="後台導覽">
      <ng-container *ngFor="let item of navItems">
        <a *ngIf="canView(item)" [routerLink]="item.path" routerLinkActive="active" (click)="sidebarOpen = false">
          <span>{{ item.icon }}</span>
          {{ item.label }}
        </a>
      </ng-container>
    </nav>
  </aside>

  <div class="sidebar-overlay" [class.visible]="sidebarOpen" (click)="sidebarOpen = false"></div>

  <section class="workspace">
    <header class="topbar">
      <div>
        <button class="menu-toggle" (click)="toggleSidebar()" aria-label="切換選單">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="eyebrow">Admin Console</span>
        <strong>社團管理系統</strong>
      </div>
      <div class="topbar-right">
        <label class="club-select" *ngIf="manageableClubs().length > 0">
          社團
          <select [value]="clubContext.selectedClubId()" (change)="onSelectClub($any($event.target).value)">
            <option value="">— 選擇社團 —</option>
            <option *ngFor="let club of manageableClubs()" [value]="club.id">{{ club.name }}</option>
          </select>
        </label>
        <span class="user-info">
          <span class="avatar">{{ auth.currentUser()?.avatar }}</span>
          <span>{{ auth.currentUser()?.name }} ({{ auth.currentUser()?.role }})</span>
        </span>
        <a class="btn ghost" (click)="auth.logout()" style="cursor:pointer">登出</a>
      </div>
    </header>

    <main>
      <router-outlet />
    </main>
  </section>
</div>

<ng-template #loginView>
  <router-outlet />
</ng-template>
